<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OkakPix</title>
<style>
:root {
  --accent: #8b5cf6;
  --accent2: #3b82f6;
  --bg: #080810;
  --bar: rgba(6,6,16,0.97);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  font-family:'Segoe UI',system-ui,sans-serif;
  overflow:hidden;user-select:none;color:#fff;
  -webkit-tap-highlight-color:transparent;
}

/* VIEWPORT */
#vp{
  position:fixed;inset:0;touch-action:none;overflow:hidden;
  background:#060610;
  cursor:crosshair;
}
#cw{
  position:absolute;transform-origin:0 0;
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
  image-rendering:crisp-edges;
}
#mc,#hc{
  display:block;
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
  image-rendering:crisp-edges;
}
#hc{position:absolute;top:0;left:0;pointer-events:none;}

/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;height:50px;
  background:var(--bar);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;padding:0 14px;gap:12px;z-index:200;
}
#logo{
  font-size:19px;font-weight:900;letter-spacing:-0.5px;
  background:linear-gradient(90deg,#a78bfa,#60a5fa,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;flex-shrink:0;
}
#online-wrap{
  display:flex;align-items:center;gap:5px;
  font-size:12px;color:rgba(255,255,255,0.45);white-space:nowrap;
}
#odot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
#coord-bar{
  font-size:11px;color:rgba(255,255,255,0.3);
  font-family:monospace;background:rgba(255,255,255,0.04);
  padding:3px 9px;border-radius:7px;white-space:nowrap;
}
.tsep{flex:1;}
#uarea{display:flex;align-items:center;gap:8px;flex-shrink:0;}
#utag{
  display:none;font-size:12px;color:#c4b5fd;
  background:rgba(139,92,246,0.18);border:1px solid rgba(139,92,246,0.3);
  padding:3px 10px;border-radius:99px;white-space:nowrap;
}
#admin-badge{
  display:none;font-size:10px;font-weight:700;
  background:linear-gradient(90deg,#f59e0b,#ef4444);
  color:#fff;padding:2px 8px;border-radius:99px;
}
#login-btn{
  font-size:12px;color:#fff;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border:none;padding:6px 14px;border-radius:99px;
  cursor:pointer;font-weight:700;white-space:nowrap;
  box-shadow:0 2px 12px rgba(139,92,246,0.4);
  transition:opacity .15s;
}
#login-btn:hover{opacity:.85;}

/* COOLDOWN — великий лічильник */
#cd-wrap{
  position:fixed;top:58px;left:50%;transform:translateX(-50%);
  z-index:150;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:opacity .4s;
}
#cd-wrap.hidden{opacity:0;}
#cd-num{
  font-size:64px;font-weight:900;font-family:monospace;line-height:1;
  color:#fff;
  text-shadow:0 0 40px rgba(139,92,246,.9),0 0 80px rgba(59,130,246,.4);
  transition:color .3s,text-shadow .3s;
}
#cd-wrap.full #cd-num{
  color:#4ade80;
  text-shadow:0 0 30px rgba(74,222,128,.8),0 0 60px rgba(74,222,128,.3);
}
#cd-wrap.low #cd-num{
  color:#f87171;
  text-shadow:0 0 30px rgba(248,113,113,.9);
}
#cd-wrap.admin #cd-num{
  color:#f59e0b;
  text-shadow:0 0 30px rgba(245,158,11,.8);
}
#cd-label{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase;}

/* STACK BAR */
#shud{
  position:fixed;bottom:82px;left:50%;transform:translateX(-50%);
  z-index:150;display:flex;flex-direction:column;align-items:center;gap:5px;
  pointer-events:none;
}
#stxt{font-size:11px;color:rgba(255,255,255,.4);}
#sb-bg{width:190px;height:7px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;border:1px solid rgba(255,255,255,.07);}
#sb-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s,background .4s;}

/* PALETTE */
#palette{
  position:fixed;bottom:8px;left:50%;transform:translateX(-50%);
  z-index:150;
  background:var(--bar);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:8px 10px;
  display:flex;gap:5px;flex-wrap:wrap;justify-content:center;
  max-width:calc(100vw - 16px);
}
.sw{
  width:27px;height:27px;border-radius:7px;cursor:pointer;
  border:3px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0;
}
.sw:hover{transform:scale(1.22);}
.sw.sel{border-color:#fff;transform:scale(1.3);box-shadow:0 0 0 2px rgba(255,255,255,.25),0 4px 12px rgba(0,0,0,.7);}

/* TOOLBAR */
#toolbar{
  position:fixed;right:10px;top:50%;transform:translateY(-50%);
  z-index:150;display:flex;flex-direction:column;gap:7px;
}
.tbtn{
  width:42px;height:42px;border-radius:12px;
  background:var(--bar);border:1px solid rgba(255,255,255,.07);
  color:rgba(255,255,255,.45);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .14s;
}
.tbtn:hover{background:rgba(139,92,246,.25);color:#fff;border-color:rgba(139,92,246,.5);}
.tbtn.active{background:rgba(139,92,246,.55);color:#fff;border-color:var(--accent);}
.tbtn span{font-size:11px;font-weight:700;}

/* ZOOM */
#zbg{
  position:fixed;right:10px;bottom:90px;
  z-index:150;display:flex;flex-direction:column;gap:4px;
}
.zbtn{
  width:32px;height:32px;border-radius:9px;background:var(--bar);
  border:1px solid rgba(255,255,255,.07);
  color:rgba(255,255,255,.55);font-size:17px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .14s;
}
.zbtn:hover{background:rgba(139,92,246,.3);color:#fff;}

/* NOTIF */
#notif{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  background:rgba(139,92,246,.95);color:#fff;
  padding:7px 18px;border-radius:99px;
  font-size:13px;font-weight:700;z-index:400;
  opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 20px rgba(139,92,246,.5);
}

/* MODAL BASE */
.modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:500;align-items:center;justify-content:center;
}
.modal.open{display:flex;}
.modal-box{
  background:#0f1020;border:1px solid rgba(255,255,255,.1);
  border-radius:22px;padding:30px 26px;
  width:310px;max-width:calc(100vw - 28px);
  display:flex;flex-direction:column;gap:14px;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
}
.modal-title{
  font-size:20px;font-weight:900;text-align:center;
  background:linear-gradient(90deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.mclose{
  position:absolute;top:14px;right:16px;
  background:none;border:none;color:rgba(255,255,255,.35);
  font-size:20px;cursor:pointer;padding:4px;line-height:1;
  transition:color .15s;
}
.mclose:hover{color:#fff;}
.tabs{display:flex;background:rgba(255,255,255,.04);border-radius:10px;padding:3px;gap:3px;}
.tab{flex:1;padding:7px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.4);transition:all .15s;}
.tab.active{background:rgba(139,92,246,.5);color:#fff;font-weight:700;}
.inp{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
  border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;width:100%;
  outline:none;transition:border-color .15s;
}
.inp:focus{border-color:rgba(139,92,246,.6);}
.inp::placeholder{color:rgba(255,255,255,.25);}
.submit-btn{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border:none;border-radius:10px;padding:12px;
  color:#fff;font-size:14px;font-weight:800;cursor:pointer;
  transition:opacity .15s;box-shadow:0 4px 15px rgba(139,92,246,.4);
}
.submit-btn:hover{opacity:.85;}
.errmsg{font-size:12px;text-align:center;color:#f87171;min-height:16px;}

/* LOADING */
#loading{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;gap:16px;
}
#load-logo{
  font-size:42px;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(90deg,#a78bfa,#60a5fa,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#load-sub{font-size:13px;color:rgba(255,255,255,.3);}
#load-prog-bg{width:200px;height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;}
#load-prog{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;width:0;transition:width .3s;}
#conn-status{font-size:12px;color:rgba(255,255,255,.25);font-family:monospace;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div id="load-logo">OkakPix</div>
  <div id="load-sub">Підключення до сервера…</div>
  <div id="load-prog-bg"><div id="load-prog"></div></div>
  <div id="conn-status">ws://…</div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">🟪 OkakPix</div>
  <div id="online-wrap"><div id="odot"></div><span id="ocnt">0</span>&nbsp;онлайн</div>
  <div id="coord-bar">x: 0 &nbsp; y: 0</div>
  <div class="tsep"></div>
  <div id="uarea">
    <span id="admin-badge">👑 ADMIN</span>
    <span id="utag"></span>
    <button id="login-btn">Увійти</button>
  </div>
</div>

<!-- COOLDOWN NUMBER -->
<div id="cd-wrap" class="full">
  <div id="cd-num">0:00</div>
  <div id="cd-label">до повного стаку</div>
</div>

<!-- VIEWPORT -->
<div id="vp">
  <div id="cw">
    <canvas id="mc"></canvas>
    <canvas id="hc"></canvas>
  </div>
</div>

<!-- STACK HUD -->
<div id="shud">
  <div id="stxt">Стак: <span id="sc">120</span> / 120</div>
  <div id="sb-bg"><div id="sb-fill" style="width:100%"></div></div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tbtn active" id="t-pixel" title="Піксель [1]">🖊</button>
  <button class="tbtn" id="t-pencil" title="Олівець [2]">✏️</button>
</div>

<!-- ZOOM -->
<div id="zbg">
  <button class="zbtn" id="zi">+</button>
  <button class="zbtn" id="zo">−</button>
</div>

<!-- PALETTE -->
<div id="palette"></div>

<!-- NOTIF -->
<div id="notif"></div>

<!-- AUTH MODAL -->
<div class="modal" id="auth-modal">
  <div class="modal-box">
    <button class="mclose" id="auth-close">✕</button>
    <div class="modal-title">OkakPix</div>
    <div class="tabs">
      <div class="tab active" data-t="login">Вхід</div>
      <div class="tab" data-t="register">Реєстрація</div>
    </div>
    <input class="inp" id="a-user" type="text" placeholder="Нікнейм" autocomplete="username">
    <input class="inp" id="a-pass" type="password" placeholder="Пароль" autocomplete="current-password">
    <input class="inp" id="a-pass2" type="password" placeholder="Повтор пароля" autocomplete="new-password" style="display:none">
    <button class="submit-btn" id="a-submit">Увійти</button>
    <div class="errmsg" id="a-err"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const CANVAS_W = 1000;
const CANVAS_H = 1000;
const MAX_STACK = 120;
const REGEN_MS  = 1000;

const PALETTE_COLORS = [
  '#FFFFFF','#E4E4E4','#888888','#555555','#222222','#000000',
  '#FFA7D1','#E50000','#E59500','#A06A42','#E5D900','#94E044',
  '#02BE01','#00D3DD','#0083C7','#0000EA','#CF6EE4','#820080',
  '#FF5A00','#FFFF00','#6CFF00','#00FF8C','#00CFFF','#5500FF',
  '#FF00FF','#FF007B','#C0C0FF','#B5ECEA','#F6D7B0','#FFEFD5'
];

// ═══════════════════════════════════════════════
//  AUDIO (Web Audio API — без файлів!)
// ═══════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playClick() {
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.05);
    gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    osc.start(); osc.stop(audioCtx.currentTime + 0.08);
  } catch(e) {}
}

function playEmpty() {
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  } catch(e) {}
}

function playRegen() {
  try {
    ensureAudio();
    [440, 550, 660].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      const t = audioCtx.currentTime + i*0.08;
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t+0.15);
      osc.start(t); osc.stop(t+0.15);
    });
  } catch(e) {}
}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let stack        = MAX_STACK;
let lastRegen    = Date.now();
let selColor     = '#E50000';
let tool         = 'pixel';
let scale        = 1;
let ox = 0, oy   = 0;
let spaceDown    = false;
let noCooldown   = false;  // admin
let currentUser  = null;
let authMode     = 'login';

// websocket
let ws = null;
let wsConnected = false;

// canvas image data
let pixelData = null; // Uint8ClampedArray RGBA

// ═══════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════
const mc  = document.getElementById('mc');
const hc  = document.getElementById('hc');
const ctx = mc.getContext('2d');
const hx  = hc.getContext('2d');
mc.width = CANVAS_W; mc.height = CANVAS_H;
hc.width = CANVAS_W; hc.height = CANVAS_H;
const cw  = document.getElementById('cw');
const vp  = document.getElementById('vp');

function applyT()  { cw.style.transform = `translate(${ox}px,${oy}px) scale(${scale})`; }
function centerCanvas() {
  ox = (window.innerWidth  - CANVAS_W * scale) / 2;
  oy = (window.innerHeight - CANVAS_H * scale) / 2;
  applyT();
}

// ═══════════════════════════════════════════════
//  CANVAS LOADING FROM SERVER
// ═══════════════════════════════════════════════
let loadedPixels = 0;
let totalPixels  = CANVAS_W * CANVAS_H;

function initPixelData() {
  pixelData = new Uint8ClampedArray(CANVAS_W * CANVAS_H * 4);
}

function applyChunk(offset, base64Data) {
  const binary = atob(base64Data);
  const bytes  = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  // bytes is RGBA slice starting at offset*4
  pixelData.set(bytes, offset * 4);
  loadedPixels = Math.min(totalPixels, loadedPixels + bytes.length / 4);
}

function flushCanvas() {
  const imgData = new ImageData(pixelData, CANVAS_W, CANVAS_H);
  ctx.putImageData(imgData, 0, 0);
}

// Load canvas as image via /canvas.raw
async function loadCanvasHTTP() {
  try {
    const resp = await fetch('/canvas.raw');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const buf  = await resp.arrayBuffer();
    pixelData  = new Uint8ClampedArray(buf);
    if (pixelData.length === CANVAS_W * CANVAS_H * 4) {
      flushCanvas();
      setLoadProg(1);
      return true;
    }
  } catch(e) {
    console.warn('[Canvas] HTTP load failed:', e.message);
  }
  return false;
}

function setLoadProg(frac) {
  document.getElementById('load-prog').style.width = (frac * 100) + '%';
}

// ═══════════════════════════════════════════════
//  WEBSOCKET
// ═══════════════════════════════════════════════
function connectWS() {
  const proto  = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl  = `${proto}://${location.host}`;
  document.getElementById('conn-status').textContent = wsUrl;

  ws = new WebSocket(wsUrl);

  ws.onopen = async () => {
    wsConnected = true;
    console.log('[WS] Connected');
    setLoadProg(0.2);
    // Завантажити полотно через HTTP (швидше)
    const ok = await loadCanvasHTTP();
    if (!ok) {
      // Fallback: через WS chunks
      ws.send(JSON.stringify({ type: 'request_canvas' }));
    } else {
      hideLoading();
    }
    // Автологін
    const savedUser = localStorage.getItem('op_user');
    const savedPass = localStorage.getItem('op_pass');
    if (savedUser && savedPass) {
      ws.send(JSON.stringify({ type: 'login', username: savedUser, password: savedPass }));
    }
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    handleMsg(msg);
  };

  ws.onclose = () => {
    wsConnected = false;
    console.log('[WS] Disconnected. Reconnecting in 3s…');
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

let chunksReceived = 0;
function handleMsg(msg) {
  switch(msg.type) {

    case 'init':
      break;

    case 'canvas_chunk': {
      if (!pixelData) initPixelData();
      applyChunk(msg.offset, msg.data);
      chunksReceived++;
      setLoadProg(0.2 + 0.8 * (chunksReceived / msg.totalChunks));
      if (chunksReceived >= msg.totalChunks) {
        flushCanvas();
        hideLoading();
      }
      break;
    }

    case 'pixel': {
      // Один піксель від сервера
      const { x, y, color } = msg;
      const r = parseInt(color.slice(1,3),16);
      const g = parseInt(color.slice(3,5),16);
      const b = parseInt(color.slice(5,7),16);
      const i = (y*CANVAS_W+x)*4;
      if (pixelData) { pixelData[i]=r; pixelData[i+1]=g; pixelData[i+2]=b; pixelData[i+3]=255; }
      ctx.fillStyle = color;
      ctx.fillRect(x, y, 1, 1);
      break;
    }

    case 'auth_ok': {
      currentUser    = msg.username;
      noCooldown     = msg.noCooldown;
      stack          = noCooldown ? MAX_STACK : (msg.stack || MAX_STACK);
      lastRegen      = Date.now();
      document.getElementById('utag').textContent = '👤 ' + currentUser;
      document.getElementById('utag').style.display = '';
      document.getElementById('login-btn').style.display = 'none';
      if (noCooldown) {
        document.getElementById('admin-badge').style.display = '';
        document.getElementById('cd-wrap').classList.add('admin');
      }
      closeModal('auth-modal');
      updateHUD();
      showNotif('✅ Привіт, ' + currentUser + '!');
      break;
    }

    case 'auth_fail':
      document.getElementById('a-err').textContent = msg.reason;
      break;

    case 'stack_update':
      stack = msg.stack;
      updateHUD();
      break;

    case 'stack_empty':
      playEmpty();
      showNotif('Стак порожній! Зачекайте 🕒');
      break;

    case 'online':
      document.getElementById('ocnt').textContent = msg.count;
      break;

    default: break;
  }
}

// ═══════════════════════════════════════════════
//  LOADING
// ═══════════════════════════════════════════════
let loadingHidden = false;
function hideLoading() {
  if (loadingHidden) return;
  loadingHidden = true;
  setLoadProg(1);
  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    document.getElementById('loading').style.transition = 'opacity .5s';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
  }, 300);
}

// ═══════════════════════════════════════════════
//  PALETTE
// ═══════════════════════════════════════════════
function buildPalette() {
  const c = document.getElementById('palette');
  PALETTE_COLORS.forEach(col => {
    const s = document.createElement('div');
    s.className = 'sw' + (col === selColor ? ' sel' : '');
    s.style.background = col;
    s.addEventListener('pointerdown', e => {
      e.stopPropagation();
      document.querySelectorAll('.sw').forEach(x => x.classList.remove('sel'));
      s.classList.add('sel');
      selColor = col;
    });
    c.appendChild(s);
  });
}

// ═══════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════
let wasEmpty = false;
function updateHUD() {
  if (noCooldown) {
    document.getElementById('sc').textContent = '∞';
    document.getElementById('sb-fill').style.width = '100%';
    document.getElementById('sb-fill').style.background = 'linear-gradient(90deg,#f59e0b,#ef4444)';
    document.getElementById('cd-num').textContent = '0:00';
    document.getElementById('cd-label').textContent = 'Admin — без кулдауну';
    return;
  }

  document.getElementById('sc').textContent = stack;
  const pct = (stack / MAX_STACK) * 100;
  const fill = document.getElementById('sb-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct > 60
    ? 'linear-gradient(90deg,#8b5cf6,#3b82f6)'
    : pct > 25
    ? 'linear-gradient(90deg,#f59e0b,#ef4444)'
    : 'linear-gradient(90deg,#ef4444,#991b1b)';

  const missing = MAX_STACK - stack;
  const m = Math.floor(missing / 60), s = missing % 60;
  document.getElementById('cd-num').textContent = `${m}:${s.toString().padStart(2,'0')}`;

  const cdWrap = document.getElementById('cd-wrap');
  cdWrap.classList.remove('full','low','admin');
  if (stack === MAX_STACK) {
    cdWrap.classList.add('full');
    if (wasEmpty) { playRegen(); wasEmpty = false; }
  } else if (stack <= 10) {
    cdWrap.classList.add('low');
    if (stack === 0) wasEmpty = true;
  }
}

// ═══════════════════════════════════════════════
//  REGEN LOOP (клієнтська сторона для плавності)
// ═══════════════════════════════════════════════
function regenLoop() {
  if (!noCooldown && currentUser) {
    const now = Date.now();
    const toAdd = Math.floor((now - lastRegen) / REGEN_MS);
    if (toAdd > 0 && stack < MAX_STACK) {
      stack = Math.min(MAX_STACK, stack + toAdd);
      lastRegen = now - ((now - lastRegen) % REGEN_MS);
      updateHUD();
    }
  }
  requestAnimationFrame(regenLoop);
}

// ═══════════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════════
let ntimer;
function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.style.opacity = '1';
  clearTimeout(ntimer);
  ntimer = setTimeout(() => n.style.opacity = '0', 2400);
}

// ═══════════════════════════════════════════════
//  ZOOM
// ═══════════════════════════════════════════════
function zoomAt(sx, sy, f) {
  const ns = Math.min(50, Math.max(0.25, scale * f));
  const r  = ns / scale;
  ox = sx - r*(sx - ox);
  oy = sy - r*(sy - oy);
  scale = ns; applyT();
}

// ═══════════════════════════════════════════════
//  SCREEN → CANVAS
// ═══════════════════════════════════════════════
function s2c(sx, sy) {
  const rect = vp.getBoundingClientRect();
  return {
    cx: Math.floor((sx - rect.left - ox) / scale),
    cy: Math.floor((sy - rect.top  - oy) / scale)
  };
}

function updCoords(sx, sy) {
  const { cx, cy } = s2c(sx, sy);
  document.getElementById('coord-bar').textContent = `x: ${cx} \u00a0 y: ${cy}`;
  return { cx, cy };
}

// ═══════════════════════════════════════════════
//  PLACE PIXEL
// ═══════════════════════════════════════════════
function placePixel(px, py) {
  if (px < 0 || py < 0 || px >= CANVAS_W || py >= CANVAS_H) return false;
  if (!currentUser) { showNotif('⚠️ Спочатку увійдіть в акаунт'); openModal('auth-modal'); return false; }
  if (!noCooldown && stack <= 0) { playEmpty(); showNotif('Стак порожній! 🕒'); return false; }

  playClick();

  // Оптимістично рендеримо одразу
  ctx.fillStyle = selColor;
  ctx.fillRect(px, py, 1, 1);

  // Надсилаємо на сервер
  send({ type: 'pixel', x: px, y: py, color: selColor });

  if (!noCooldown) {
    stack = Math.max(0, stack - 1);
    updateHUD();
  }
  return true;
}

function drawLine(x0,y0,x1,y1) {
  const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  const sx=x0<x1?1:-1,sy=y0<y1?1:-1;
  let err=dx-dy,x=x0,y=y0,steps=0;
  while(true) {
    if (!noCooldown && stack <= 0) break;
    placePixel(x, y);
    if(x===x1&&y===y1) break;
    const e2=2*err;
    if(e2>-dy){err-=dy;x+=sx;}
    if(e2<dx){err+=dx;y+=sy;}
    if(++steps>3000) break;
  }
}

// ═══════════════════════════════════════════════
//  HOVER
// ═══════════════════════════════════════════════
function drawHover(px, py) {
  hx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  if (px<0||py<0||px>=CANVAS_W||py>=CANVAS_H) return;
  hx.fillStyle = selColor;
  hx.globalAlpha = 0.7;
  hx.fillRect(px, py, 1, 1);
  hx.globalAlpha = 1;
  hx.strokeStyle = 'rgba(255,255,255,0.85)';
  hx.lineWidth   = 0.35;
  hx.strokeRect(px+0.1, py+0.1, 0.8, 0.8);
}

// ═══════════════════════════════════════════════
//  POINTER INPUT
// ═══════════════════════════════════════════════
let activePtr = {};       // pointerId → {x,y}
let pencilId  = null;
let pencilLX  = -1, pencilLY = -1;
let panId     = null;
let panSX=0,panSY=0,panOX=0,panOY=0;
let pinchIds  = null;
let pinchDist = 0;

function isUI(e) {
  return e.target.closest('#toolbar,#zbg,#palette,#topbar,#shud,.modal');
}

vp.addEventListener('pointerdown', e => {
  if (isUI(e)) return;
  ensureAudio();
  vp.setPointerCapture(e.pointerId);
  activePtr[e.pointerId] = { x:e.clientX, y:e.clientY };
  const ids = Object.keys(activePtr);

  if (ids.length >= 2) {
    // Pinch
    pencilId = null; panId = null;
    pinchIds = [+ids[0], +ids[1]];
    const p0=activePtr[pinchIds[0]], p1=activePtr[pinchIds[1]];
    pinchDist = Math.hypot(p0.x-p1.x, p0.y-p1.y);
    return;
  }

  if (e.pointerType === 'mouse') {
    if (e.button === 1 || e.button === 2 || spaceDown) {
      panId=e.pointerId; panSX=e.clientX; panSY=e.clientY; panOX=ox; panOY=oy;
      vp.style.cursor='grabbing'; return;
    }
    if (e.button === 0) {
      const {cx,cy} = updCoords(e.clientX, e.clientY);
      if (tool === 'pixel') { placePixel(cx,cy); }
      else { pencilId=e.pointerId; pencilLX=cx; pencilLY=cy; placePixel(cx,cy); }
    }
  } else {
    // Touch
    if (tool === 'pencil') {
      pencilId=e.pointerId;
      const {cx,cy}=s2c(e.clientX,e.clientY);
      pencilLX=cx; pencilLY=cy;
      placePixel(cx,cy);
    } else {
      panId=e.pointerId; panSX=e.clientX; panSY=e.clientY; panOX=ox; panOY=oy;
    }
  }
});

vp.addEventListener('pointermove', e => {
  if (!activePtr[e.pointerId]) return;
  activePtr[e.pointerId] = { x:e.clientX, y:e.clientY };
  const ids = Object.keys(activePtr).map(Number);

  // Pinch zoom
  if (pinchIds && ids.length >= 2 && pinchIds.every(id => activePtr[id])) {
    const p0=activePtr[pinchIds[0]], p1=activePtr[pinchIds[1]];
    const d = Math.hypot(p0.x-p1.x, p0.y-p1.y);
    const mx=(p0.x+p1.x)/2, my=(p0.y+p1.y)/2;
    if (pinchDist > 0) zoomAt(mx, my, d/pinchDist);
    pinchDist = d;
    return;
  }

  if (e.pointerId === pencilId) {
    const {cx,cy}=s2c(e.clientX,e.clientY);
    updCoords(e.clientX,e.clientY);
    if (cx!==pencilLX || cy!==pencilLY) {
      drawLine(pencilLX,pencilLY,cx,cy);
      pencilLX=cx; pencilLY=cy;
    }
    return;
  }

  if (e.pointerId === panId) {
    ox = panOX+(e.clientX-panSX);
    oy = panOY+(e.clientY-panSY);
    applyT(); hx.clearRect(0,0,CANVAS_W,CANVAS_H);
    return;
  }

  if (e.pointerType === 'mouse') {
    const {cx,cy} = updCoords(e.clientX,e.clientY);
    drawHover(cx,cy);
  }
});

vp.addEventListener('pointerup', e => {
  const prev = activePtr[e.pointerId];
  delete activePtr[e.pointerId];

  if (pinchIds) { pinchIds=null; pinchDist=0; }
  if (e.pointerId===pencilId) { pencilId=null; pencilLX=-1; pencilLY=-1; }
  if (e.pointerId===panId) {
    panId=null;
    if (e.pointerType!=='mouse' && tool==='pixel' && prev) {
      const moved = Math.hypot(e.clientX-panSX, e.clientY-panSY);
      if (moved < 8) { const {cx,cy}=s2c(e.clientX,e.clientY); placePixel(cx,cy); }
    }
    if (!spaceDown) vp.style.cursor = tool==='pencil'?'cell':'crosshair';
  }
});

vp.addEventListener('pointercancel', e => {
  delete activePtr[e.pointerId];
  if (e.pointerId===pencilId) pencilId=null;
  if (e.pointerId===panId) panId=null;
  pinchIds=null;
});

vp.addEventListener('wheel', e => {
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.deltaY<0?1.2:1/1.2);
}, {passive:false});

vp.addEventListener('contextmenu', e => e.preventDefault());

// ═══════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════
window.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  if (e.code==='Space') { spaceDown=true; vp.style.cursor='grab'; e.preventDefault(); }
  if (e.code==='Equal'||e.code==='NumpadAdd') zoomAt(window.innerWidth/2,window.innerHeight/2,1.25);
  if (e.code==='Minus'||e.code==='NumpadSubtract') zoomAt(window.innerWidth/2,window.innerHeight/2,.8);
  if (e.key==='1') document.getElementById('t-pixel').click();
  if (e.key==='2') document.getElementById('t-pencil').click();
});
window.addEventListener('keyup', e => {
  if (e.code==='Space') { spaceDown=false; vp.style.cursor=tool==='pencil'?'cell':'crosshair'; }
});

// ═══════════════════════════════════════════════
//  TOOL BUTTONS
// ═══════════════════════════════════════════════
document.getElementById('t-pixel').onclick = () => {
  tool='pixel';
  document.getElementById('t-pixel').classList.add('active');
  document.getElementById('t-pencil').classList.remove('active');
  vp.style.cursor='crosshair';
};
document.getElementById('t-pencil').onclick = () => {
  tool='pencil';
  document.getElementById('t-pencil').classList.add('active');
  document.getElementById('t-pixel').classList.remove('active');
  vp.style.cursor='cell';
};
document.getElementById('zi').onclick = () => zoomAt(window.innerWidth/2,window.innerHeight/2,1.5);
document.getElementById('zo').onclick = () => zoomAt(window.innerWidth/2,window.innerHeight/2,1/1.5);

// ═══════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.getElementById('login-btn').onclick  = () => openModal('auth-modal');
document.getElementById('auth-close').onclick = () => closeModal('auth-modal');
document.getElementById('auth-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('auth-modal')) closeModal('auth-modal');
});

document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    authMode = t.dataset.t;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('a-pass2').style.display = authMode==='register'?'':'none';
    document.getElementById('a-submit').textContent  = authMode==='register'?'Зареєструватись':'Увійти';
    document.getElementById('a-err').textContent = '';
  };
});

document.getElementById('a-submit').onclick = () => {
  const user = document.getElementById('a-user').value.trim();
  const pass = document.getElementById('a-pass').value;
  const pass2= document.getElementById('a-pass2').value;
  const err  = document.getElementById('a-err');
  if (!user||!pass) { err.textContent='Заповніть всі поля'; return; }
  if (authMode==='register' && pass!==pass2) { err.textContent='Паролі не збігаються'; return; }
  err.textContent='';
  send({ type: authMode, username: user, password: pass });
  // Зберегти для автологіну
  localStorage.setItem('op_user', user);
  localStorage.setItem('op_pass', pass);
};

// Enter у полях
['a-user','a-pass','a-pass2'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key==='Enter') document.getElementById('a-submit').click();
  });
});

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
window.addEventListener('resize', centerCanvas);
buildPalette();
initPixelData();
centerCanvas();
updateHUD();
requestAnimationFrame(regenLoop);
connectWS();
</script>
